# Случайный порядок тест-МЕТОДОВ внутри класса. Вместе с surefire runOrder=random (порядок
# КЛАССОВ) это гарантирует: тесты не зависят от порядка выполнения. Если где-то появится
# скрытая завязка на порядок — она упадёт, а не замаскируется удачным прогоном.
junit.jupiter.testmethod.order.default=org.junit.jupiter.api.MethodOrderer$Random
